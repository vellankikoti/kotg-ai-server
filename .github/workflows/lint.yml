name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.24" }
      - run: go build ./...
      - run: go test ./... -count=1 -timeout=120s
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
