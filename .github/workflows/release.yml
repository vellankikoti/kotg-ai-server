name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.24" }
      - run: go build ./...
      - run: go test ./... -count=1 -timeout=120s
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
